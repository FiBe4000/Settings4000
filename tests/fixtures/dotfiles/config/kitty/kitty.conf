include colors.conf
include fonts.conf

enable_audio_bell no
background_opacity 1.0

# Remote control over a per-instance abstract unix socket ({kitty_pid} gives
# each kitty its own socket). Enables future flicker-free palette switching via
# `kitten @ set-colors`; SIGUSR1 remains the v1 reload path.
allow_remote_control socket-only
listen_on unix:@kitty-{kitty_pid}
