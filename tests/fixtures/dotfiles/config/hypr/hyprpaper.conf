wallpaper {
    monitor =
    # Keep this in sync with hyprlock.conf's `background.path` — same image as the
    # lock screen. The settings app treats this as one "wallpaper" setting; change
    # both together, or set a lock-screen override in hyprlock.conf.
    path = /home/user/Pictures/wallpaper/wallpaper.jpg
    fit_mode = cover
}

splash = false
