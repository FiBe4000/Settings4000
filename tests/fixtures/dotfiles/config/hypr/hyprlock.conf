source = ~/.config/hypr/colors.conf

background {
    monitor =
    # Keep this in sync with hyprpaper.conf's `wallpaper.path` — same image as the
    # desktop wallpaper. The settings app treats this as one "wallpaper" setting
    # (with an optional lock-screen override); change both together, or override here.
    path = /home/user/Pictures/wallpaper/wallpaper.jpg

    # all these options are taken from hyprland, see the wiki for explanations
    blur_passes = 2 # 0 disables blurring
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    outer_color = $bg3
    inner_color = $bg0
    font_color = $fg2
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i></i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = $orange
    fail_color = $red # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    shadow_passes = 2
    shadow_size = 3
    shadow_boost = 0.8

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $fg2
    font_size = 100
    font_family = Noto Sans
    shadow_passes = 2
    shadow_size = 3
    shadow_boost = 0.8

    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A %d %B %Y")"
    color = $fg2
    font_size = 25
    font_family = Noto Sans
    shadow_passes = 2
    shadow_size = 3
    shadow_boost = 0.8

    position = 0, 80
    halign = center
    valign = center
}

auth {
    fingerprint {
        enabled = true
        ready_message = "Scan fingerprint to unlock"
        present_message = "Scanning..."
    }
}
