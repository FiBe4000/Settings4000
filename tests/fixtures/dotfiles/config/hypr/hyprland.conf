# Hyprland configuration.
#
# Refer to the wiki for more information.

# Sourced sub-configs (colors, monitors, input)
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf

cursor {
    inactive_timeout=0
}

# Session env is consolidated in config/uwsm/env (Qt/GTK/Ozone/backend hints).
# ONLY cursor theme/size is duplicated here on purpose: it must be present at
# Hyprland level too, kept identical to uwsm/env (canonical). Do not add other
# env = lines here — put non-cursor session env in config/uwsm/env instead.
env = XCURSOR_THEME,Nordic-cursors
env = XCURSOR_SIZE,16

general {
    gaps_in=6
    gaps_out=0,12,12,12
    border_size=3
    col.active_border=$accent2
    col.inactive_border=$bg3

    #apply_sens_to_raw=0 # whether to apply the sensitivity to raw input
}

decoration {
    rounding=13
    blur {
        enabled=true
        size=3 # minimum 1
        passes=3 # minimum 1, more passes = more resource intensive.
        new_optimizations=true
    }
    # Your blur "amount" is blur_size * blur_passes, but high blur_size (over
    # around 5-ish) will produce artifacts.
}

animations {
    enabled=1
    animation=windows,1,3,default
    animation=border,1,10,default
    animation=fadeIn,1,10,default
    animation=workspaces,1,1,default
}

misc {
    disable_hyprland_logo=true
    disable_splash_rendering=true
    vrr=1
}

# Don't bitmap-upscale XWayland surfaces on a fractional-scale eDP-1 panel —
# that makes X11 apps look blurry.
xwayland {
    force_zero_scaling = true
}

# example window rules
#windowrule=float,abc
windowrule = no_blur on, match:title ^()$, match:class ^()$

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window

bind=SUPERSHIFT,Q,exit,
bind=CONTROLALT,L,exec,hyprlock
bind=SUPERSHIFTENTER,RETURN,exec,kitty
bind=SUPER,C,killactive,
bind=SUPER,F,fullscreen,0
bind=SUPER,P,exec,rofi -show drun
bind=SUPERSHIFT,D,exec,~/.dotfiles/scripts/hypr-toggle-laptop-display

bind=SUPER,H,movefocus,l
bind=SUPER,L,movefocus,r
bind=SUPER,K,movefocus,u
bind=SUPER,J,movefocus,d

bind=SUPER,1,focusworkspaceoncurrentmonitor,1
bind=SUPER,2,focusworkspaceoncurrentmonitor,2
bind=SUPER,3,focusworkspaceoncurrentmonitor,3

bind=,XF86AudioLowerVolume,exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=,XF86AudioRaiseVolume,exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=,XF86AudioMute,exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Bind switches
#bindl=,switch:Lid Switch,exec,hyprlock
#bindl=,switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"

#exec-once=~/.dotfiles/scripts/launchportals.sh
exec-once=~/.dotfiles/scripts/islaptop.sh

exec-once=uwsm app -- hyprpaper
exec-once=uwsm app -- swaync
exec-once=uwsm app -- nm-applet
exec-once=uwsm app -- hypridle
exec-once=~/.dotfiles/scripts/hypr-monitor-hotplug
exec-once=~/.dotfiles/scripts/launch-eww-bars
