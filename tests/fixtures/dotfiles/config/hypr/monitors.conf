# Dynamic monitor configuration
# Known monitors use desc: rules (stable across DP port changes)
# Unknown monitors fall through to the catchall

# Catchall — any unrecognized monitor gets native resolution, auto-placed
monitor=,preferred,auto,1

# Built-in laptop panel (eDP-1). The hotplug script disables it when docked and
# re-enables it undocked. Per-machine settings are keyed on the panel's EDID
# desc — a later matching rule overrides the generic eDP-1 rule above it, so
# each laptop only picks up its own line. This file is the SINGLE SOURCE for
# eDP mode/scale: scripts/hypr-display-profile.sh parses the matching monitor=
# line below to derive EDP_MODE/EDP_SCALE/EDP_EXTRA/EDP_DPI for hotplug and
# toggle. Edit here.

# Laptop A — 2880x1800 120Hz 10-bit panel, 1.333x (default for eDP-1)
monitor=eDP-1,2880x1800@120,auto,1.333333,bitdepth,10

# Laptop B — 2560x1440 panel keyed on its EDID desc, 1.066667x
monitor=desc:Example Panel Vendor 0x2036,2560x1440,auto,1.066667

# Office — dual external 1440p setup
monitor=desc:Example Monitor Corp QHD-24 0x0001,2560x1440,0x0,1
monitor=desc:Example Monitor Corp QHD-24 0x0002,2560x1440,2560x0,1

# Home — external monitors (uncomment and verify desc strings when at home)
#monitor=desc:Example Home Display 27G 0x0003,2560x1440,-2560x0,1
#monitor=desc:Example Home Display 27T 0x0004,2560x1440,0x0,1
