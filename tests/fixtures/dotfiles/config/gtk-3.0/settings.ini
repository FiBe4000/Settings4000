[Settings]
gtk-theme-name=Everforest-Green-Dark
gtk-icon-theme-name=Everforest-Dark
gtk-font-name=Noto Sans  10
# Cursor theme/size: keep in sync with config/uwsm/env (canonical) and hyprland.conf
# NOTE: in an XSETTINGS/dconf session GTK apps take the cursor from gsettings (org.gnome.desktop.interface cursor-theme/cursor-size), which currently differs;
# keep dconf aligned with Nordic-cursors/16 for these values to take effect.
gtk-cursor-theme-name=Nordic-cursors
gtk-cursor-theme-size=16
gtk-toolbar-style=3
gtk-toolbar-icon-size=GTK_ICON_SIZE_LARGE_TOOLBAR
gtk-button-images=0
gtk-menu-images=0
gtk-enable-event-sounds=1
gtk-enable-input-feedback-sounds=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
gtk-application-prefer-dark-theme=0
gtk-cursor-blink=true
gtk-cursor-blink-time=1000
gtk-decoration-layout=icon:minimize,maximize,close
gtk-enable-animations=true
gtk-modules=colorreload-gtk-module
gtk-primary-button-warps-slider=true
gtk-sound-theme-name=ocean
gtk-xft-dpi=98304
